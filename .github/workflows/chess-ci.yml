name: onlineChess CI

# Lint + build check for onlineChess. Scoped to onlineChess/ so other projects
# don't trigger it.

on:
  push:
    paths:
      - 'onlineChess/**'
      - '.github/workflows/chess-ci.yml'
  pull_request:
    paths:
      - 'onlineChess/**'
      - '.github/workflows/chess-ci.yml'

concurrency:
  group: chess-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: onlineChess

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: onlineChess/package-lock.json
      - run: npm ci
      # No lint step — onlineChess has no eslint configured (the `lint` script
      # references eslint but it isn't a dependency). The build is the real gate.
      - run: npm run build
