name: PGHub Deploy

# The site is GitHub Pages serving this repo as-is, and PGHub/dist/ is the
# committed build that Pages serves at pushkalgupta.com/PGHub/dist/. This workflow
# removes the manual "build + commit dist" chore: on a push to main that changes
# PGHub SOURCE, it re-runs the full check suite, rebuilds, and commits the fresh
# dist/ back to main for you.
#
# IMPORTANT — pushing to a protected main:
# main has a ruleset requiring the "lint · guards · build · concept-parse" check,
# which by default blocks even this job's auto-commit of dist/. Because the job
# below re-runs the FULL check suite before committing, it is safe to let it push
# past the rule.
#
# One-time setup (chosen approach — bypass list, no PAT):
#   Settings → Rules → Rulesets → (your main ruleset) → "Bypass list" → Add bypass
#   → add "Repository admin" (and/or the GitHub Actions app). Then the default
#   GITHUB_TOKEN below can push the auto-commit.
#   (Alternative: set a fine-grained PAT with Contents:read/write as secret
#    DEPLOY_PAT — the checkout below uses it automatically if present.)
#
# After it runs, `git pull` to pick up the auto-committed dist/.

on:
  push:
    branches: [main]
    paths:
      # Rebuild only when SOURCE changes — never on a dist-only commit (avoids a
      # loop). The auto-commit below also carries [skip ci] as a second guard.
      - 'PGHub/src/**'
      - 'PGHub/index.html'
      - 'PGHub/package.json'
      - 'PGHub/package-lock.json'
      - 'PGHub/vite.config.js'
      - 'PGHub/public/**'
      - 'PGHub/content/**'
  workflow_dispatch: {}

# Never let two deploys race the same branch; let a running one finish so its
# push isn't clobbered.
concurrency:
  group: pghub-deploy
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    working-directory: PGHub

jobs:
  build-and-commit:
    name: validate → build → commit dist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Push with a bypass-capable PAT if provided; otherwise the default
          # token (works only if Actions is on the ruleset bypass list).
          token: ${{ secrets.DEPLOY_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: PGHub/package-lock.json

      - name: Install dependencies
        run: npm ci

      # The same gates as the CI check — a broken build never deploys, even
      # though the push below bypasses the branch ruleset.
      - name: Lint (eslint — zero errors)
        run: npm run lint

      - name: Guards (nul · emoji · secret)
        run: node scripts/ci-guards.mjs all

      - name: Build (production)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Concept markdown parses (dry)
        run: node scripts/import-concepts.js --dry > /dev/null

      - name: Commit dist/ if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          if git diff --cached --quiet; then
            echo "dist/ unchanged — nothing to deploy."
            exit 0
          fi
          git commit -m "chore(PGHub): rebuild dist [skip ci]"
          # Rebase onto anything that landed while we were building, then push.
          git pull --rebase origin main
          git push origin HEAD:main
