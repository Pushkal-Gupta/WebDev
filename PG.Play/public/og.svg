<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bloomA" cx="0.12" cy="0.92" r="0.55">
      <stop offset="0" stop-color="#00fff5" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#00fff5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bloomB" cx="0.88" cy="0.08" r="0.50">
      <stop offset="0" stop-color="#ff5cb6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff5cb6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00fff5"/>
      <stop offset="1" stop-color="#3a8dff"/>
    </linearGradient>
    <pattern id="noise" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.4" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Base + atmosphere -->
  <rect width="1200" height="630" fill="#070a0d"/>
  <rect width="1200" height="630" fill="url(#bloomA)"/>
  <rect width="1200" height="630" fill="url(#bloomB)"/>
  <rect width="1200" height="630" fill="url(#noise)"/>

  <!-- Wordmark -->
  <g transform="translate(96, 230)" font-family="Inter, system-ui, -apple-system, sans-serif">
    <text x="0" y="0" font-size="180" font-weight="700" fill="#f1f5f8" letter-spacing="-6">PG</text>
    <circle cx="270" cy="-58" r="14" fill="url(#dot)"/>
    <text x="312" y="0" font-size="180" font-weight="700" fill="#f1f5f8" letter-spacing="-6">Play</text>
  </g>

  <!-- Tagline -->
  <g transform="translate(96, 350)" font-family="Inter, system-ui, -apple-system, sans-serif">
    <text x="0" y="0" font-size="38" font-weight="500" fill="#94a3b1">A boutique browser arcade.</text>
    <text x="0" y="56" font-size="38" font-weight="500" fill="#94a3b1">Four hand-built originals. Two quiet classics.</text>
  </g>

  <!-- URL chip -->
  <g transform="translate(96, 510)">
    <rect x="0" y="0" width="280" height="46" rx="23" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <text x="24" y="30" font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#f1f5f8" letter-spacing="2">PUSHKALGUPTA.COM/PG.PLAY</text>
  </g>

  <!-- Genre dots, tying the brand to the four originals -->
  <g transform="translate(1000, 510)">
    <circle cx="0"  cy="0" r="9" fill="#ff5cb6"/>
    <circle cx="28" cy="0" r="9" fill="#00fff5"/>
    <circle cx="56" cy="0" r="9" fill="#ffd24a"/>
    <circle cx="84" cy="0" r="9" fill="#a78bfa"/>
  </g>
</svg>
