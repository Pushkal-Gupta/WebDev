  <path d="M 84 58 L 68 62" stroke="#0a0d0e" stroke-width="3.6" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="52" cy="70" r="5.5" fill="#fff" stroke="#0a0d0e" stroke-width="2"/>
  <circle cx="76" cy="70" r="5.5" fill="#fff" stroke="#0a0d0e" stroke-width="2"/>
  <circle cx="53" cy="71" r="2.4" fill="#0a0d0e"/>
  <circle cx="77" cy="71" r="2.4" fill="#0a0d0e"/>
  <!-- Frown -->
  <path d="M 54 88 Q 64 82 74 88" stroke="#0a0d0e" stroke-width="3" fill="none" stroke-linecap="round"/>
