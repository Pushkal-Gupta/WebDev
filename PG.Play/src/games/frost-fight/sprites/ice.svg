<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Ice cube body -->
  <rect x="14" y="14" width="100" height="100" rx="14" fill="#d9ecf5" stroke="#0a0d0e" stroke-width="4"/>
  <!-- Inner facet — top-left, brighter -->
  <path d="M 18 18 L 110 18 L 100 28 L 28 28 Z" fill="#ffffff" opacity="0.55"/>
  <path d="M 18 18 L 18 110 L 28 100 L 28 28 Z" fill="#ffffff" opacity="0.45"/>
  <!-- Inner facet — bottom-right, darker -->
  <path d="M 110 18 L 110 110 L 100 100 L 100 28 Z" fill="#7ac0e0" opacity="0.55"/>
  <path d="M 18 110 L 110 110 L 100 100 L 28 100 Z" fill="#7ac0e0" opacity="0.45"/>
  <!-- Sparkles -->
  <path d="M 38 44 L 50 56 M 50 44 L 38 56"
        stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <path d="M 78 78 L 88 88 M 88 78 L 78 88"
        stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="84" cy="44" r="2.5" fill="#ffffff" opacity="0.8"/>
</svg>
