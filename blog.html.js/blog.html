<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Pushkal Gupta Blog</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="blog.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="nav-group">
          <a
            href="#"
            onclick="
              showHome();
              return false;
            "
            class="brand-link"
            >Pushkal Gupta Blog</a
          >
          <div class="header-right">
            <div class="toggle-wrap" onclick="toggleTheme()">
              <span class="toggle-label" id="mode-label">Dark</span>
              <div class="switch-base"></div>
            </div>
            <button id="auth-btn" class="auth-btn" onclick="handleAuth()">
              LOGIN
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="container" id="main-ui">
      <main id="home-view">
        <p class="tagline">
          Exploring systems from first principles. Writing to understand things
          clearly.
        </p>
        <div id="post-list"></div>
      </main>
    </div>

    <div id="post-view" class="hidden">
      <div id="p-content"><div id="loader" class="hidden"></div></div>
      <div class="container">
        <div class="comments-section">
          <div class="comment-count" id="c-count">0 Comments</div>
          <div id="comment-input-area"></div>
          <div id="comments-list" style="margin-top: 3rem"></div>
        </div>
      </div>
    </div>

    <div id="auth-modal" class="hidden">
      <div class="modal-content">
        <h3 id="modal-title">Welcome Back</h3>
        <button class="google-login-btn" onclick="loginWithGoogle()">
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt="G"
          />
          Continue with Google
        </button>
        <div class="divider"><span>or use email</span></div>
        <div id="email-fields">
          <input type="email" id="auth-email" placeholder="Email address" />
          <div id="password-container">
            <input type="password" id="auth-password" placeholder="Password" />
          </div>
          <button
            onclick="submitAuth()"
            id="submit-auth-btn"
            class="primary-btn"
          >
            Continue
          </button>
        </div>
        <div class="modal-footer">
          <p id="auth-switch-text">
            New here?
            <span onclick="setAuthMode('signup')">Create account</span>
          </p>
          <p id="forgot-password-link">
            <span onclick="setAuthMode('reset')">Forgot password?</span>
          </p>
        </div>
        <button onclick="closeAuthModal()" class="close-x">×</button>
      </div>
    </div>

    <script src="blog.js"></script>
  </body>
</html>
